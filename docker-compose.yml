services:
  app:
    build:
      context: ./security-erp
      dockerfile: Dockerfile
    container_name: security-erp-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./security-erp:/var/www
      - ./php.ini:/usr/local/etc/php/conf.d/custom.ini
    expose:
      - "9000"
    networks:
      - security-erp-net
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: security-erp-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./security-erp:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - security-erp-net
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: security-erp-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: security_erp
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: security_erp
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - security-erp-net

  redis:
    image: redis:7-alpine
    container_name: security-erp-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - security-erp-net

  mailpit:
    image: axllent/mailpit
    container_name: security-erp-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025" # واجهة الويب لعرض الرسائل المرسلة
      - "1025:1025" # منفذ SMTP الذي يستقبل منه Laravel الرسائل
    networks:
      - security-erp-net

networks:
  security-erp-net:
    driver: bridge

volumes:
  mysql_data:
